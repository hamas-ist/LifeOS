    const playVictorySound = () => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext(); const osc = ctx.createOscillator(); const gainNode = ctx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(440, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1); osc.frequency.exponentialRampToValueAtTime(1760, ctx.currentTime + 0.3); 
        gainNode.gain.setValueAtTime(0, ctx.currentTime); gainNode.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.1); gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1.5);

    const MagneticButton = ({ children, onClick, className }) => {
      const ref = useRef(null);
      const [position, setPosition] = useState({x:0, y:0});
      const handleMouse = (e) => {
        const { clientX, clientY } = e;
        const { height, width, left, top } = ref.current.getBoundingClientRect();
        const middleX = clientX - (left + width/2);
        const middleY = clientY - (top + height/2);
        setPosition({x: middleX * 0.2, y: middleY * 0.2});
      };
      const reset = () => setPosition({x:0, y:0});
      return (
        <motion.button ref={ref} onMouseMove={handleMouse} onMouseLeave={reset} animate={{x: position.x, y: position.y}} transition={{type: "spring", stiffness: 150, damping: 15, mass: 0.1}} onClick={onClick} className={className}>
          {children}

        try {
          const user = JSON.parse(localStorage.getItem('matrix-user'));
          const userId = user ? user.id : 'default';
          const fullKey = `matrix-${key}-${userId}`;
          const item = window.localStorage.getItem(fullKey);
          return item ? JSON.parse(item) : initialValue;
        } catch (error) {

              <div className="flex justify-between items-center mb-6">
                <h3 className="text-xl md:text-2xl font-black text-matrix-light uppercase tracking-widest">Settings</h3>
                <button onClick={close} className="text-matrix-garnet font-black hover:scale-110 transition-transform">X</button>
              </div>
              
              <div className="mb-6 p-4 md:p-5 bg-[rgba(255,255,255,0.05)] rounded-xl border border-[rgba(255,255,255,0.1)]">
                <label className="block text-[10px] md:text-xs font-black text-matrix-gold mb-3 uppercase tracking-widest">Matrix AI Key (Gemini)</label>
                <input type="password" placeholder="Paste key here..." className="glass-input font-mono text-xs md:text-sm" value={settings.geminiKey || ''} onChange={(e) => setSettings({...settings, geminiKey: e.target.value})} />
                <p className="text-[9px] md:text-[10px] text-matrix-gray mt-3 font-bold uppercase tracking-widest">Stored securely in your local browser memory.</p>
              </div>
              
              <button onClick={() => setSettings(s => ({...s, theme: s.theme === 'light' ? 'dark' : 'light'}))} className="w-full py-4 mt-2 bg-[rgba(255,255,255,0.1)] text-matrix-light font-black rounded-xl tracking-widest uppercase hover:scale-105 transition-transform text-xs md:text-sm">
                Toggle Mode: {settings.theme === 'light' ? 'Deepwork (Dark)' : 'Light'}
              </button>
            </div>
          </motion.div>
        </div>
      );
    };

    const App = () => {
      const [user, setUser] = useState(null);
      const [activeTab, setActiveTab] = useState('CEO Briefing');
      const [settings, setSettings] = useState(() => { try { return JSON.parse(localStorage.getItem('matrix-godmode')) || { geminiKey: '', theme: 'dark' }; } catch { return { geminiKey: '', theme: 'dark' }; } });
      const [showSettings, setShowSettings] = useState(false);

      useEffect(() => { localStorage.setItem('matrix-godmode', JSON.stringify(settings)); }, [settings]);
      useEffect(() => { 
        const savedUser = localStorage.getItem('matrix-user'); 
        if (savedUser) { 
          const parsed = JSON.parse(savedUser); 
          setUser(parsed); 
          setActiveTab(parsed.role === 'associate' ? 'Finance' : 'CEO Briefing'); 
        } 
      }, []);

      useEffect(() => {
        document.body.className = settings.theme === 'light' ? 'theme-light' : '';
      }, [settings.theme]);

      const handleLogin = (u) => { setUser(u); localStorage.setItem('matrix-user', JSON.stringify(u)); setActiveTab(u.role === 'associate' ? 'Finance' : 'CEO Briefing'); };
      const handleLogout = () => { setUser(null); localStorage.removeItem('matrix-user'); };

      const getGreeting = () => { const h = new Date().getHours(); if (h < 12) return 'Good Morning'; if (h < 18) return 'Good Afternoon'; if (h >= 21) return 'Get rest'; return 'Good Evening'; };

      if (!user) {
        return (
          <SettingsContext.Provider value={{ settings, setSettings }}>
            <ToastProvider>
              <MeshBackground theme={settings.theme} />
              {settings.theme === 'dark' && <Starfield />}
              <LoginScreen onLogin={handleLogin} />
            </ToastProvider>
          </SettingsContext.Provider>
        );
      }

      const allowedTabs = user.role === 'founder' ? TABS : ['Finance'];

      return (
        <SettingsContext.Provider value={{ settings, setSettings }}>
          <ToastProvider>
            <div id="app-container" className="min-h-screen relative z-10">
              <MeshBackground theme={settings.theme} />
              {settings.theme === 'dark' && <Starfield />}
              
              <nav className="fixed top-0 left-0 right-0 z-50 glass-nav">
                <div className="max-w-7xl mx-auto px-4 md:px-6 flex justify-between items-center h-20 md:h-24">
                  <div className="flex items-center space-x-1 md:space-x-2 overflow-x-auto hide-scrollbar w-full py-4">
                    <div className="mr-3 md:mr-8 flex items-center gap-2 shrink-0">
                      <div className="w-8 h-8 md:w-10 md:h-10 rounded-full bg-matrix-gold flex items-center justify-center shadow-[0_0_15px_rgba(241,211,2,0.4)]">
                        <span className="font-black text-matrix-midnight text-sm md:text-base">M</span>
                      </div>
                      <span className="font-black text-matrix-gold tracking-widest uppercase hidden md:inline-block text-lg">Matrix</span>
                    </div>
                    {allowedTabs.map(tab => (
                      <MagneticButton key={tab} onClick={() => setActiveTab(tab)} className={`relative px-3 md:px-5 py-2 md:py-2.5 rounded-full text-[10px] md:text-xs font-black whitespace-nowrap uppercase tracking-widest transition-colors ${activeTab === tab ? 'text-matrix-midnight' : 'text-matrix-gray hover:text-matrix-light'}`}>
                        {activeTab === tab && <motion.div layoutId="nav-pill" className="absolute inset-0 bg-matrix-gold rounded-full shadow-[0_0_15px_rgba(241,211,2,0.3)]" transition={{type:'spring', stiffness: 300, damping: 30}} />}
                        <span className="relative z-10">{tab}</span>
                      </MagneticButton>
                    ))}
                  </div>
                  <div className="flex items-center gap-1 md:gap-2 shrink-0 ml-2 md:ml-4">
                    <button onClick={() => setShowSettings(true)} className="p-2 rounded-full hover:bg-[rgba(255,255,255,0.1)] transition-colors"><IconSettings c="w-4 h-4 md:w-5 md:h-5 text-matrix-light" /></button>
                    <button onClick={handleLogout} className="p-2 rounded-full hover:bg-matrix-garnet/20 transition-colors group"><IconLogOut c="w-4 h-4 md:w-5 md:h-5 text-matrix-gray group-hover:text-matrix-garnet" /></button>
                  </div>
                </div>
              </nav>
              
              <main className="max-w-7xl mx-auto px-4 md:px-6 py-8 pt-28 md:pt-36 pb-32">
                <div className="mb-10 md:mb-16">
                  <h1 className="text-matrix-light mb-2 md:mb-4 tracking-widest uppercase drop-shadow-[0_0_10px_rgba(255,255,255,0.1)]">{getGreeting()}, {user.name}.</h1>
                  <p className="text-matrix-slate text-[10px] md:text-lg font-black tracking-widest uppercase">Your intelligent life engine is ready.</p>
                </div>
                
                <AnimatePresence mode="wait">
                  <motion.div key={activeTab} initial={{opacity:0,y:20}} animate={{opacity:1,y:0}} exit={{opacity:0,y:-20}} transition={{type:'spring', stiffness: 200, damping: 20}}>
                    {activeTab === 'Daily Routine' && <DailyRoutine />} {activeTab === 'Fitness' && <Fitness />} {activeTab === 'Diet' && <Diet />} {activeTab === 'Finance' && <Finance />} {activeTab === 'Income' && <Income />} {activeTab === 'English' && <English />} {activeTab === 'CEO Briefing' && <CEOBriefing />} {activeTab === 'Tracker' && <Tracker />} {activeTab === 'To-Do' && <ToDo />} {activeTab === 'Analytics' && <Analytics />}
                  </motion.div>
                </AnimatePresence>
              </main>

              {showSettings && <SettingsModal close={() => setShowSettings(false)} />}

              <footer className="fixed bottom-4 right-4 z-50">
                <div className="apple-card-wrapper shadow-[0_0_15px_rgba(241,211,2,0.2)]">
                  <div className="apple-card px-4 py-2 md:px-6 md:py-3 text-[8px] md:text-[10px] font-black text-matrix-gold uppercase tracking-widest bg-matrix-midnight/80">
                    Matrix by HAMAS KHAN
                  </div>
                </div>
              </footer>

            </div>
          </ToastProvider>
        </SettingsContext.Provider>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
