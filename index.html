      const setTxs = (updater) => updateAppData('finance', updater);
      const loggedUser = role === 'founder' ? 'hamas' : 'misbah';
      const [newTx, setNewTx] = useState({ desc: '', amount: '', paidBy: loggedUser, splitType: 'combine' });
      const logTx = (e) => { e.preventDefault(); if(!newTx.desc||!newTx.amount) return; setTxs(p => [{ id: Date.now(), date: new Date().toLocaleDateString(), ...newTx, amount: Number(newTx.amount) }, ...p]); setNewTx({ desc: '', amount: '', paidBy: loggedUser, splitType: 'combine' }); };
      let balance = 0;
      txs.forEach(t => { if(t.paidBy==='hamas') balance += t.splitType==='combine'?t.amount/2:(t.splitType==='misbah'?t.amount:0); else if(t.paidBy==='misbah') balance -= t.splitType==='combine'?t.amount/2:(t.splitType==='hamas'?t.amount:0); });
      return (
        <div className="space-y-6 max-w-6xl mx-auto">
          <div className="matrix-card p-6 flex justify-between items-center border-l-8 border-matrix-gold"><div><h3 className="subheading-clamp">Net Settlement</h3><p className="text-sm font-bold">{balance===0?"Settled":balance>0?"Misbah owes Hamas":"Hamas owes Misbah"}</p></div><div className="heading-clamp text-matrix-gold">Rs {Math.abs(balance)}</div></div>
          <div className="grid lg:grid-cols-3 gap-6"><div className="matrix-card p-6"><form onSubmit={logTx}><input placeholder="Item" className="w-full p-3 mb-2 rounded-xl" value={newTx.desc} onChange={e=>setNewTx({...newTx,desc:e.target.value})}/><input placeholder="Amount" type="number" className="w-full p-3 mb-2" value={newTx.amount} onChange={e=>setNewTx({...newTx,amount:e.target.value})}/><button type="submit" className="w-full bg-matrix-gold text-matrix-midnight font-black p-3 rounded-xl">Log</button></form></div><div className="lg:col-span-2 matrix-card p-6"><h3 className="font-bold text-lg">History</h3>{txs.map(t=><div key={t.id} className="flex justify-between p-2 border-b border-matrix-gold/20"><span>{t.desc}</span><span>Rs {t.amount}</span></div>)}</div></div>
        </div>
      );
    };
    
    const App = ({ role }) => {
      const { appData, updateAppData } = useAppState();
      const settings = appData.settings;
      const [activeTab, setActiveTab] = useState(role === 'associate' ? 'Finance' : 'Daily Routine');
      const [showSettings, setShowSettings] = useState(false);
      const { darkMode, setDarkMode } = useTheme();
      useEffect(() => {
        if(darkMode) document.body.classList.remove('light-mode'); else document.body.classList.add('light-mode');
      },[darkMode]);
      const handleLogout = () => { localStorage.removeItem('lifeos_session'); window.location.reload(); };
      const accessibleTabs = role === 'founder' ? TABS : ['Finance'];
      return (
        <div id="app-container" className="min-h-screen">
          {role === 'founder' && <nav className="fixed bottom-0 md:top-0 left-0 right-0 z-50 matrix-nav pb-safe border-t md:border-b"><div className="max-w-7xl mx-auto px-2 flex justify-between items-center h-16"><div className="hidden md:flex items-center gap-2"><MatrixIcon c="w-8 h-8"/><span className="font-black text-matrix-gold text-xl tracking-widest">MATRIX</span></div><div className="flex overflow-x-auto gap-1 px-2">{accessibleTabs.map(tab=><button key={tab} onClick={()=>setActiveTab(tab)} className={`px-3 py-1 rounded-full text-sm font-bold whitespace-nowrap ${activeTab===tab?'bg-matrix-gold text-matrix-midnight':'text-matrix-gold/70'}`}>{tab}</button>)}</div><button onClick={()=>setShowSettings(true)} className="p-2"><IconSettings c="w-5 h-5 text-matrix-gold"/></button></div></nav>}
          <main className="max-w-7xl mx-auto px-4 py-6 pt-20 md:pt-28 pb-24">
            <div className="flex justify-between items-center mb-6"><div><h1 className="heading-clamp">Good {new Date().getHours()<12?'Morning':'Afternoon'}, {role==='founder'?'Hamas':'Misbah'}.</h1><p className="text-matrix-gold text-sm font-bold">Matrix OS — Extraordinarily Intelligent</p></div><button onClick={handleLogout} className="px-4 py-2 text-xs bg-matrix-gold/20 rounded-full text-matrix-gold">Exit</button></div>
            <AnimatePresence mode="wait"><motion.div key={activeTab} initial={{opacity:0,y:20}} animate={{opacity:1,y:0}} exit={{opacity:0}}>
              {activeTab === 'Finance' && <Finance role={role}/>}
              {role === 'founder' && activeTab !== 'Finance' && <div className="matrix-card p-12 text-center"><p className="text-matrix-gold">Module: {activeTab} — Full Access Enabled.</p></div>}
            </motion.div></AnimatePresence>
          </main>
          <footer className="text-center text-xs opacity-70 py-6 font-mono">Matrix by HAMAS KHAN</footer>
          {showSettings && <div className="fixed inset-0 bg-black/80 z-[200] flex items-center justify-center p-4"><div className="matrix-card p-6 w-full max-w-md"><h3 className="text-matrix-gold text-xl font-bold mb-4">God Mode</h3><div className="flex justify-between items-center mb-4"><span>Dark Mode</span><input type="checkbox" checked={darkMode} onChange={()=>setDarkMode(!darkMode)} className="toggle"/></div><label>Gemini Key</label><input type="password" className="w-full p-2 mt-1" value={settings.geminiKey||''} onChange={e=>updateAppData('settings',{...settings,geminiKey:e.target.value})}/><button onClick={()=>setShowSettings(false)} className="mt-4 w-full bg-matrix-gold text-matrix-midnight py-2 rounded-full">Close</button></div></div>}
        </div>
      );
    };
    
    const RootApp = () => {
      const [session, setSession] = useState(()=>{const s=localStorage.getItem('lifeos_session'); return s?JSON.parse(s):null;});
      const [darkMode, setDarkMode] = useState(true);
      const handleLogin = (role, dbId) => { const ns = { role, dbId }; localStorage.setItem('lifeos_session', JSON.stringify(ns)); setSession(ns); };
      if(!session) return (<div className="min-h-screen bg-matrix-midnight flex items-center justify-center"><div className="matrix-card p-8 text-center w-80"><MatrixIcon c="w-16 h-16 mx-auto"/><h1 className="heading-clamp text-matrix-gold">MATRIX</h1><form onSubmit={e=>{e.preventDefault(); const val=e.target.code.value.toLowerCase(); if(val==='hamas') handleLogin('founder','hamas_ist'); else if(val==='misbah') handleLogin('associate','misbah_ist'); else alert('Access Denied');}}><input name="code" type="password" placeholder="Enter ID" className="w-full p-3 my-4 text-center rounded-full"/><button className="w-full bg-matrix-gold text-matrix-midnight font-black py-3 rounded-full">Initialize</button></form><p className="text-xs mt-4 opacity-60">Matrix by HAMAS KHAN</p></div></div>);
      return <ThemeContext.Provider value={{darkMode, setDarkMode}}><AppStateProvider dbId={session.dbId}><ToastProvider><App role={session.role}/></ToastProvider></AppStateProvider></ThemeContext.Provider>;
    };
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<RootApp />);
  </script>
</body>
</html>
