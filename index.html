      return (

        </ThemeContext.Provider>
      );

    const AntigravityBackground = () => {
      const canvasRef = useRef(null);
      const { isDarkMode } = useContext(ThemeContext);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        let animationFrameId;
        let particles = [];
        
        let mouse = { x: null, y: null };
        const handleMouseMove = (e) => {
          mouse.x = e.clientX;
          mouse.y = e.clientY;
        };
        window.addEventListener('mousemove', handleMouseMove);

        const resize = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        };
        window.addEventListener('resize', resize);
        resize();

        // Elegant minimal particles: Indigo and Slate
        const colors = isDarkMode ? ['#4f46e5', '#334155', '#6366f1'] : ['#e2e8f0', '#cbd5e1', '#818cf8'];

        class Particle {
          constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 0.5;
            this.baseX = this.x;
            this.baseY = this.y;
            this.density = (Math.random() * 20) + 1;
            this.color = colors[Math.floor(Math.random() * colors.length)];
            this.vx = (Math.random() - 0.5) * 0.3;
            this.vy = (Math.random() - 0.5) * 0.3;
          }
          
          draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.closePath();
            ctx.fillStyle = this.color;
            ctx.globalAlpha = isDarkMode ? 0.4 : 0.6;
            ctx.fill();
            ctx.globalAlpha = 1.0;
          }
          
          update() {
            this.x += this.vx;
            this.y += this.vy;
            
            if (this.x > canvas.width) this.x = 0;
            if (this.x < 0) this.x = canvas.width;
            if (this.y > canvas.height) this.y = 0;
            if (this.y < 0) this.y = canvas.height;

            if (mouse.x != null && mouse.y != null) {
              let dx = mouse.x - this.x;
              let dy = mouse.y - this.y;
              let distance = Math.sqrt(dx * dx + dy * dy);
              let forceDirectionX = dx / distance;
              let forceDirectionY = dy / distance;
              let maxDistance = 120;
              let force = (maxDistance - distance) / maxDistance;
              let directionX = forceDirectionX * force * this.density * 0.8;
              let directionY = forceDirectionY * force * this.density * 0.8;
              
              if (distance < maxDistance) {
                this.x -= directionX;
                this.y -= directionY;
              }
            }
          }
        }

        const init = () => {
          particles = [];
          for (let i = 0; i < 150; i++) {
            particles.push(new Particle());
          }
        };
        init();

        const animate = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].draw();
          }
          animationFrameId = requestAnimationFrame(animate);
        };
        animate();

        return () => {
          window.removeEventListener('resize', resize);
          window.removeEventListener('mousemove', handleMouseMove);
          cancelAnimationFrame(animationFrameId);
        };
      }, [isDarkMode]);

              <div>
                <h1 className="heading-clamp text-slate-800 dark:text-white mb-1 md:mb-4 tracking-tight drop-shadow-md">{getGreeting()}, {role === 'founder' ? 'Hamas' : 'Misbah'}.</h1>
                <p className="text-slate-600 dark:text-zinc-300 text-sm md:text-2xl font-bold tracking-tight">{role === 'founder' ? 'Your premium cloud engine is active.' : 'Associate Ledger Access Active.'}</p>
              </div>
              <button onClick={handleLogout} className="px-4 py-2 bg-slate-200/50 dark:bg-zinc-800/80 border border-slate-300 dark:border-zinc-600 rounded-full text-[10px] md:text-xs font-bold text-slate-800 dark:text-white shadow-sm hover:scale-105 hover:bg-rose-500 dark:bg-rose-500 transition-all">Logout</button>
            </div>
            <AnimatePresence mode="wait">
              <motion.div key={activeTab} initial={{ opacity: 0, y: 20, scale: 0.98 }} animate={{ opacity: 1, y: 0, scale: 1 }} exit={{ opacity: 0, y: -20, scale: 0.98 }} transition={{ type: 'spring', stiffness: 300, damping: 25 }}>
                {activeTab === 'Daily Routine' && <DailyRoutine />}
                {activeTab === 'Fitness' && <Fitness />}
                {activeTab === 'Diet' && <Diet />}
                {activeTab === 'Finance' && <Finance role={role} />}
                {activeTab === 'Income' && <Income />}
                {activeTab === 'English' && <English />}
                {activeTab === 'CEO Briefing' && <CEOBriefing />}
                {activeTab === 'Tracker' && <Tracker />}
                {activeTab === 'To-Do' && <ToDo />}
                {activeTab === 'Analytics' && <Analytics />}
              </motion.div>
            </AnimatePresence>

            <div className="mt-16 text-center border-t border-slate-300/50 dark:border-zinc-700 pt-8 pb-10">
              <p className="text-[#f1d302] font-extrabold text-xs md:text-sm tracking-[0.2em] uppercase">Matrix by HAMAS KHAN</p>
            </div>
          </main>
          {settings.shield && role === 'founder' && <div className="shield-container"><div className={`shield shield-${shieldLevel}`}></div></div>}
          {showSettings && <SettingsModal close={() => setShowSettings(false)} />}
        </div>
      );
    };

    const RootApp = () => {
      const [session, setSession] = useState(() => {
        const saved = localStorage.getItem('lifeos_session');
        return saved ? JSON.parse(saved) : null;
      });

      const handleLogin = (role, dbId) => {
        const newSession = { role, dbId };
        localStorage.setItem('lifeos_session', JSON.stringify(newSession));
        setSession(newSession);
      };

      if (!session) {
        return (
          <ThemeProvider>
            <LoginScreen onLogin={handleLogin} />
          </ThemeProvider>
        );
      }

      return (
        <ThemeProvider>
          <AppStateProvider dbId={session.dbId}>
            <ToastProvider>
              <App role={session.role} />
            </ToastProvider>
          </AppStateProvider>
        </ThemeProvider>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<RootApp />);
  </script>
</body>

</html>
