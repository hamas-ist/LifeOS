      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext(); const osc = ctx.createOscillator(); const gainNode = ctx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(440, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1); osc.frequency.exponentialRampToValueAtTime(1760, ctx.currentTime + 0.3);

      const tasksRef = useRef(appData.todo);
      useEffect(() => { tasksRef.current = appData.todo; }, [appData.todo]);
      
      const [triggered, setTriggered] = useState({});

      useEffect(() => {

              </form>
              <div className="mt-8 space-y-3">
                {todayMeals.map(m => (<div key={m.id} className="flex justify-between items-center p-4 bg-[#f5f5f7] rounded-[16px]"><div><h5 className="font-bold text-apple-text">{m.name} <span className="text-apple-gray text-xs">x{m.qty}</span></h5><div className="text-sm font-semibold text-apple-gray space-x-3 mt-1"><span>{m.cal} kcal</span><span className="text-apple-green">{m.pro}g P</span></div></div><button onClick={() => setDailyMeals(p => ({ ...p, [todayDate]: p[todayDate].filter(x => x.id !== m.id) }))} className="w-8 h-8 rounded-full bg-white text-apple-red font-bold">X</button></div>))}
              </div>
            </div>
            <div className="apple-card p-8"><h3 className="text-2xl font-bold text-apple-text mb-6">Auto Plan</h3><AutoDietPlan targetCal={targetCal} /></div>
          </div>
        </div>
      );
    };

    const ToDo = () => {
      const { showToast } = useToast();
      const { appData, updateAppData } = useAppState();
      const tasks = appData.todo;
      const setTasks = (updater) => updateAppData('todo', updater);
      
      const [newTask, setNewTask] = useState({ title: '', dueDate: '', dueTime: '' });

      const addTask = (e) => {
        e.preventDefault(); if(!newTask.title) return;
        setTasks(p => [...p, { id: Date.now(), ...newTask, completed: false }]);
        setNewTask({ title: '', dueDate: '', dueTime: '' });
        showToast("Task scheduled successfully.", "To-Do");
      };
      const toggle = (id) => setTasks(p => p.map(t => t.id === id ? { ...t, completed: !t.completed } : t));
      const remove = (id) => setTasks(p => p.filter(t => t.id !== id));

      return (
        <div className="apple-card p-8 md:p-12 max-w-4xl mx-auto">
          <div className="flex items-center gap-4 mb-10"><IconList c="w-10 h-10 text-apple-blue" /><h2 className="text-4xl font-bold text-apple-text">Mission Control</h2></div>
          <form onSubmit={addTask} className="flex flex-col md:flex-row gap-4 mb-12">
            <input type="text" placeholder="E.g. Database Quiz" className="flex-1 p-4 bg-[#f5f5f7] rounded-2xl font-bold" value={newTask.title} onChange={e=>setNewTask({...newTask, title: e.target.value})} />
            <input type="date" className="p-4 bg-[#f5f5f7] rounded-2xl font-bold font-sans" value={newTask.dueDate} onChange={e=>setNewTask({...newTask, dueDate: e.target.value})} />
            <input type="time" className="p-4 bg-[#f5f5f7] rounded-2xl font-bold font-sans" value={newTask.dueTime} onChange={e=>setNewTask({...newTask, dueTime: e.target.value})} />
            <button type="submit" className="px-8 py-4 bg-apple-blue text-white font-bold rounded-2xl">Schedule</button>
          </form>
          <div className="space-y-4">
            {tasks.sort((a,b)=>a.completed-b.completed).map(t => (
              <motion.div key={t.id} layout className={`flex items-center justify-between p-5 rounded-2xl border ${t.completed ? 'bg-white opacity-50 border-black/5' : 'bg-[#f5f5f7] border-black/5'}`}>
                <div className="flex items-center gap-4 cursor-pointer" onClick={() => toggle(t.id)}>
                  <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center transition-colors ${t.completed ? 'bg-apple-blue border-apple-blue' : 'border-apple-gray'}`}>{t.completed && <IconCheck c="w-4 h-4 text-white" />}</div>
                  <div className={t.completed ? 'line-through text-apple-gray' : 'text-apple-text font-bold text-lg'}>{t.title}</div>
                </div>
                <div className="flex items-center gap-4">
                  {t.dueDate && <span className="text-sm font-bold text-apple-orange bg-apple-orange/10 px-3 py-1 rounded-full">{t.dueDate} {t.dueTime}</span>}
                  <button onClick={() => remove(t.id)} className="text-apple-red font-bold text-sm px-2">Delete</button>
                </div>
              </motion.div>
            ))}
            {tasks.length === 0 && <p className="text-apple-gray font-medium text-center py-10">No upcoming missions. You are clear.</p>}
          </div>
        </div>
      );
    };

    const Tracker = () => {
      const { showToast } = useToast(); 
      const { appData, updateAppData } = useAppState();
      const settings = appData.settings;
      const data = appData.tracker;
      const setData = (updater) => updateAppData('tracker', updater);

      const toggle = (day, habit) => {
        const key = `${day}-${habit}`; const isChecked = data[key]; const newData = { ...data, [key]: !isChecked };
        setData(newData);
        if (!isChecked && ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'].includes(habit)) {
          const allPrayersDone = ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'].every(p => newData[`${day}-${p}`]);
          if (allPrayersDone && window.confetti) {
            window.confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 }, colors: ['#50C878', '#FFD700', '#ffffff'] });
            showToast("You've completed all 5 prayers today. Absolute greatness.", "Alhamdulillah ✨");
            playVictorySound();
          }
        }
        if (!isChecked && habit.includes('Sleep') && settings.dopamineRain) {
          document.getElementById('app-container').classList.add('shake-active'); setTimeout(() => document.getElementById('app-container').classList.remove('shake-active'), 500);
          if (window.confetti) window.confetti({ particleCount: 300, spread: 160, origin: { y: 0.5 }, colors: ['#50C878', '#FFD700'], disableForReducedMotion: true });
          playVictorySound();
        }
      };

      return (
        <div className="apple-card p-12 overflow-x-auto"><h2 className="text-4xl font-bold text-apple-text mb-8">Weekly Tracker</h2><div className="min-w-[900px]">
          <div className="grid grid-cols-[220px_repeat(7,1fr)] gap-4 mb-4"><div className="font-bold text-apple-gray">Habit</div>{DAYS.map(d => <div key={d} className="text-center font-bold text-apple-gray">{d}</div>)}</div>
          <div className="space-y-3">{HABITS.map(h => (<div key={h} className="grid grid-cols-[220px_repeat(7,1fr)] gap-4 items-center group"><div className="font-bold px-4 py-3 rounded-2xl text-lg text-apple-text bg-[#f5f5f7]">{h}</div>{DAYS.map(d => { const c = data[`${d}-${h}`]; return (<div key={`${d}-${h}`} className="flex justify-center"><motion.button whileTap={{ scale: 0.8 }} onClick={() => toggle(d, h)} className={`w-12 h-12 rounded-full flex items-center justify-center transition-all ${c ? 'bg-apple-green text-white scale-105' : 'bg-[#f5f5f7]'}`}>{c && <IconCheck c="w-6 h-6" />}</motion.button></div>) })}</div>))}</div>
        </div></div>
      );
    };

    const Income = () => (<div className="apple-card p-16 text-center"><IconTarget c="w-20 h-20 mx-auto text-apple-blue mb-4"/><h2 className="text-4xl font-bold text-apple-text">Fiverr Roadmap</h2></div>);
    const English = () => (<div className="apple-card p-16 text-center"><IconBookOpen c="w-20 h-20 mx-auto text-apple-blue mb-4"/><h2 className="text-4xl font-bold text-apple-text">English Mastery</h2></div>);
    
    // CEO Briefing Tab (Gemini API Integration)
    const CEOBriefing = () => {
      const { showToast } = useToast();
      const { appData } = useAppState();
      const settings = appData.settings;
      const [briefing, setBriefing] = useState(null);
      const [displayedBriefing, setDisplayedBriefing] = useState('');
      const [loading, setLoading] = useState(false);

      useEffect(() => {
        if (!briefing) return;
        let i = 0;
        setDisplayedBriefing('');
        const interval = setInterval(() => {
          setDisplayedBriefing(briefing.substring(0, i));
          i += 2;
          if (i > briefing.length) {
            setDisplayedBriefing(briefing);
            clearInterval(interval);
          }
        }, 15);
        return () => clearInterval(interval);
      }, [briefing]);

      const generateBriefing = async () => {
        if (!settings.geminiKey) {
          showToast("Missing API Key! Please paste your Gemini API Key in the God Mode Settings menu.", "Access Denied");
          return;
        }

        setLoading(true);
        setBriefing(null);
        setDisplayedBriefing('');
        
        try {
          const tData = JSON.stringify(appData.tracker);
          const fData = JSON.stringify(appData.finance);
          const dData = JSON.stringify(appData.meals);
          const todoData = JSON.stringify(appData.todo);

          const prompt = `You are a high-stakes billionaire mentor. I am Founder Hamas, 21, at IST Islamabad. Today is Day 1 of my 5-month transformation. Analyze my JSON habits and roast/praise me based on my real-time cloud data.
          Review my raw JSON life data below. Look at the '5-prayer streak' in the tracker and my Finance ledger to see if I am staying within budget.
          - Trackers (Habits & Prayers): ${tData}
          - Finance (Split expenses): ${fData}
          - Diet Logs: ${dData}
          - To-Do List: ${todoData}
          
          Give a powerful, direct, 3-paragraph CEO briefing. 
          Paragraph 1: Praise any high consistency.
          Paragraph 2: Ruthlessly call out missed habits, overdue tasks, or poor financial decisions.
          Paragraph 3: Give a commanding order to win today.
          Do NOT use generic intro text like "Here is your briefing". Start immediately with the briefing. Format entirely in elegant markdown.`;

          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${settings.geminiKey}`, {
            method: 'POST',
            mode: 'cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
          });
          
          console.log('API Status Code:', res.status);

          if (!res.ok) {
            const errorData = await res.json();
            console.log('Exact API Error Message:', errorData);
            throw new Error(`API Error: ${res.status} - ${errorData.error?.message || 'Unknown Error'}`);
          }
          
          const data = await res.json();
          const reply = data.candidates[0].content.parts[0].text;
          setBriefing(reply);
          
          if (window.confetti) window.confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
          playVictorySound();
        } catch (e) {
          showToast("Connection to Gemini failed. Check F12 Console for details.", "System Error");
          console.error('Detailed Debugging Error:', e);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="apple-card p-12 md:p-16 text-left bg-gradient-to-br from-[#111] to-[#333] text-white shadow-xl max-w-4xl mx-auto">
          <div className="flex flex-col items-center mb-10 text-center">
            <IconBrain c="w-16 h-16 text-apple-blue mb-4" />
            <h2 className="text-4xl font-bold tracking-tight mb-2">Morning CEO Briefing</h2>
            <p className="text-gray-400 font-medium">Powered by Gemini AI Engine</p>
          </div>
          
          {!briefing && !loading && (
            <div className="flex justify-center">
              <button onClick={generateBriefing} className="px-10 py-5 bg-white text-black font-bold text-xl rounded-full shadow-[0_0_40px_rgba(255,255,255,0.2)] hover:scale-105 transition-all">
                Request Briefing
              </button>
            </div>
          )}

          {loading && (
            <div className="text-center py-10 space-y-4">
              <div className="w-10 h-10 border-4 border-apple-blue border-t-transparent rounded-full animate-spin mx-auto"></div>
              <p className="text-apple-blue font-bold tracking-widest uppercase animate-pulse">CEO is reviewing your files...</p>
            </div>
          )}

          <AnimatePresence>
            {briefing && !loading && (
              <motion.div initial={{opacity:0, y:20}} animate={{opacity:1, y:0}} className="mt-8 bg-black/40 backdrop-blur-md p-8 md:p-10 rounded-3xl border border-white/10">
                <div className="markdown-content text-lg" dangerouslySetInnerHTML={{ __html: window.marked ? window.marked.parse(displayedBriefing + (displayedBriefing.length < briefing.length ? '...' : '')) : displayedBriefing }}></div>
                {displayedBriefing.length >= briefing.length && (
                  <motion.button initial={{opacity:0}} animate={{opacity:1}} onClick={generateBriefing} className="mt-8 text-sm font-bold text-apple-gray hover:text-white uppercase tracking-widest transition-colors">Request Updated Briefing</motion.button>
                )}
              </motion.div>
            )}
          </AnimatePresence>
        </div>
      );
    };

    const Analytics = () => {
      const { appData } = useAppState();
      const [score, setScore] = useState(0); 
      useEffect(() => { 
        const tData = appData.tracker || {}; let c = 0; 
        DAYS.forEach(d => HABITS.forEach(h => { if (tData[`${d}-${h}`]) c++; })); 
        setScore(Math.round((c / 77) * 100)); 
      }, [appData.tracker]);
      return (<div className="apple-card p-12 text-center"><div className="text-9xl font-black text-apple-text mb-4">{score}%</div><p className="text-apple-gray text-2xl font-bold">Weekly Consistency</p></div>);
    };

    const SettingsModal = ({ close }) => {
      const { appData, updateAppData } = useAppState();
      const settings = appData.settings;
      const setSettings = (updater) => updateAppData('settings', updater);
      return (
        <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
          <motion.div initial={{ scale: 0.9, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} className="apple-card p-8 w-full max-w-md bg-white">
            <div className="flex justify-between items-center mb-6">
              <h3 className="text-2xl font-bold">God Mode Settings</h3>
              <button onClick={close} className="text-apple-red font-bold">Close</button>
            </div>
            
            <div className="mb-6 p-4 bg-[#f5f5f7] rounded-xl border border-black/5">
              <label className="block text-sm font-bold text-apple-text mb-2 uppercase tracking-tight">Gemini API Key</label>
              <input type="password" placeholder="Paste key here..." className="w-full p-3 rounded-lg bg-white border border-black/10 font-mono text-sm focus:outline-apple-blue" value={settings.geminiKey || ''} onChange={(e) => setSettings({...settings, geminiKey: e.target.value})} />
              <p className="text-xs text-apple-gray mt-2 font-medium">Stored securely in your cloud engine.</p>
            </div>

            <div className="space-y-4">
              {['aura', 'timeWarp', 'dopamineRain', 'shield'].map(k => (
                <div key={k} className="flex justify-between items-center p-4 bg-[#f5f5f7] rounded-xl">
                  <span className="font-bold capitalize">{k.replace(/([A-Z])/g, ' $1').trim()}</span>
                  <input type="checkbox" checked={settings[k]} onChange={(e)=>setSettings({...settings, [k]: e.target.checked})} className="w-6 h-6 cursor-pointer accent-apple-blue" />
                </div>
              ))}
            </div>
          </motion.div>
        </div>
      );
    };

    const App = () => {
      const { appData } = useAppState();
      const settings = appData.settings;
      const [activeTab, setActiveTab] = useState('CEO Briefing');
      const [showSettings, setShowSettings] = useState(false);
      const [timeMode, setTimeMode] = useState('normal'); const [aura, setAura] = useState('none'); const [shieldLevel, setShieldLevel] = useState('iron');

      useEffect(() => {
        const checkContext = () => {
          const now = new Date(); const h = now.getHours(); const m = now.getMinutes();
          if (settings.timeWarp) { if (h >= 8 && h < 16 && !(h===8 && m<30)) setTimeMode('stealth'); else if ((h >= 20 && h <= 22) && !(h===20 && m<45) && !(h===22 && m>=30)) setTimeMode('deepwork'); else setTimeMode('normal'); } else setTimeMode('normal');
          if (settings.aura) { const tData = appData.tracker; let c = 0; Object.values(tData).forEach(v => { if(v) c++; }); if (h >= 18 && c < 3) setAura('red'); else if (c > 20) setAura('gold'); else setAura('none'); } else setAura('none');
          if (settings.shield) { const tData = appData.tracker; let c = 0; Object.values(tData).forEach(v => { if(v) c++; }); if (c > 30) setShieldLevel('gold'); else if (c > 15) setShieldLevel('silver'); else if (c > 5) setShieldLevel('bronze'); else setShieldLevel('iron'); }
        };
        const int = setInterval(checkContext, 60000); checkContext(); return () => clearInterval(int);
      }, [settings, appData.tracker]);

      const getGreeting = () => { const h = new Date().getHours(); if (h < 12) return 'Good Morning'; if (h < 18) return 'Good Afternoon'; if (h >= 21) return 'Get rest'; return 'Good Evening'; };

      return (
        <div id="app-container" className={`min-h-screen ${timeMode === 'stealth' ? 'stealth-mode' : timeMode === 'deepwork' ? 'deepwork-mode' : ''}`}>
          <RoutineNotifier />
          {aura === 'red' && <div className="aura-red"></div>} {aura === 'gold' && <div className="aura-gold"></div>} {timeMode === 'deepwork' && <div className="focus-sphere"></div>}
          <nav className="fixed top-0 left-0 right-0 z-50 apple-nav">
            <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
              <div className="flex items-center space-x-2 overflow-x-auto py-4 hide-scrollbar w-full">
                <div className="mr-6 flex items-center gap-2"><IconZap c="w-5 h-5 text-apple-text"/><span className="font-black text-apple-text tracking-tight">LifeOS</span></div>
                {TABS.map(tab => (<button key={tab} onClick={() => setActiveTab(tab)} className={`relative px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap ${activeTab === tab ? 'text-white' : 'text-apple-gray'}`}>{activeTab === tab && <motion.div layoutId="nav-pill" className="absolute inset-0 bg-[#1d1d1f] rounded-full" transition={{type:'spring'}} />}<span className="relative z-10">{tab}</span></button>))}
              </div>
              <button onClick={() => setShowSettings(true)} className="ml-4 p-2 rounded-full hover:bg-black/5"><IconSettings c="w-6 h-6 text-apple-text" /></button>
            </div>
          </nav>
          <main className="max-w-7xl mx-auto px-6 py-8 pt-32 pb-32">
            <div className="mb-16">
              <h1 className="text-6xl font-bold text-apple-text mb-4 tracking-tight">{getGreeting()}, Hamas.</h1>
              <p className="text-apple-gray text-2xl font-medium tracking-tight">Your intelligent cloud engine is ready.</p>
            </div>
            <AnimatePresence mode="wait">
              <motion.div key={activeTab} initial={{opacity:0,y:10}} animate={{opacity:1,y:0}} exit={{opacity:0,y:-10}} transition={{type:'spring'}}>
                {activeTab === 'Daily Routine' && <DailyRoutine />} {activeTab === 'Fitness' && <Fitness />} {activeTab === 'Diet' && <Diet />} {activeTab === 'Finance' && <Finance />} {activeTab === 'Income' && <Income />} {activeTab === 'English' && <English />} {activeTab === 'CEO Briefing' && <CEOBriefing />} {activeTab === 'Tracker' && <Tracker />} {activeTab === 'To-Do' && <ToDo />} {activeTab === 'Analytics' && <Analytics />}
              </motion.div>
            </AnimatePresence>
          </main>
          {settings.shield && <div className="shield-container"><div className={`shield shield-${shieldLevel}`}></div></div>}
          {showSettings && <SettingsModal close={() => setShowSettings(false)} />}
        </div>
      );
    };

    const RootApp = () => (
      <AppStateProvider>
        <ToastProvider>
          <App />
        </ToastProvider>
      </AppStateProvider>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<RootApp />);
  </script>
</body>
</html>
